openapi: 3.0.3
info:
  title: EasyFactu Signing API (scaffold)
  version: "0.1.0"
servers:
  - url: https://api.example.local
paths:
  /records:
    post:
      summary: Upload a record (XML/JSON)
      requestBody:
        required: true
        content:
          application/xml: {}
          application/json: {}
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
  /records/{id}/canonicalize:
    get:
      summary: Get canonicalized string and hash for record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Canonicalization result
          content:
            application/json:
              schema:
                type: object
                properties:
                  canonical:
                    type: string
                  sha256:
                    type: string
  /records/{id}/verify:
    get:
      summary: Verify a signed package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string
  /aeat/queries:
    post:
      summary: Store an AEAT XML query/response for audit
      description: >
        Accepts a raw XML body from an AEAT service response, parses it, and
        persists an audit record in the invoice_declarations_queries table.
      parameters:
        - name: x-organization-id
          in: header
          required: false
          schema:
            type: string
            format: uuid
          description: Optional organisation identifier to tag the record
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: string
      responses:
        '201':
          description: Audit record created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AeatQuery'
        '400':
          description: Missing or empty request body
        '503':
          description: Database unavailable
    get:
      summary: List stored AEAT audit records
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of audit records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AeatQuery'
        '503':
          description: Database unavailable
  /aeat/queries/{id}:
    get:
      summary: Get a single AEAT audit record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Audit record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AeatQuery'
        '400':
          description: Invalid id
        '404':
          description: Record not found
        '503':
          description: Database unavailable
components:
  schemas:
    AeatQuery:
      type: object
      properties:
        id:
          type: integer
        organization_id:
          type: string
          format: uuid
          nullable: true
        xml_raw:
          type: string
        parsed_count:
          type: integer
        status:
          type: string
          enum: [success, error, pending]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
